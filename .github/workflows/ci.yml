name: Integración Continua (CI)

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Calidad / Pruebas / Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Verificar formato
        run: npm run formato:verificar

      - name: Verificación de anti-patrones de seguridad (si aplica)
        run: |
          npm run seguridad:antipatrones --if-present

      - name: Pruebas unitarias (con cobertura)
        run: npm run pruebas:cobertura

      - name: Umbral mínimo de cobertura
        run: npm run verificar:cobertura

      - name: Build
        run: npm run build

      - name: "Subir artefacto: cobertura"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node }}
          path: coverage/
          if-no-files-found: warn

      - name: "Subir artefacto: build"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-node-${{ matrix.node }}
          path: dist/
          if-no-files-found: warn
